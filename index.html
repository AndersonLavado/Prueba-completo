<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CELSA - Registro de Pesaje</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --celsa-red: #E30613;
      --celsa-dark: #1A1A1A;
      --celsa-light-gray: #F5F5F7;
      --celsa-border: #D1D1D6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background-color: var(--celsa-light-gray);
      color: var(--celsa-dark);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
    }

    .mobile-container {
      width: 100%;
      max-width: 480px;
      background-color: #FFFFFF;
      height: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      overflow: visible;
    }

    header {
      border-top: 4px solid var(--celsa-red);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #FFFFFF;
      border-bottom: 1px solid var(--celsa-border);
    }

    .logo-box {
      background-color: var(--celsa-red);
      color: #FFFFFF;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 3px;
      text-align: center;
      display: inline-block;
    }

    .logo-sub {
      font-size: 8px;
      font-weight: bold;
      color: #000000;
      text-transform: uppercase;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .app-title {
      font-size: 14px;
      color: #666;
      font-weight: 600;
    }

    main {
      padding: 20px;
      flex: 1 0 auto;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      border-left: 4px solid var(--celsa-red);
      padding-left: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 12px;
      color: #8E8E93;
      font-size: 16px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 12px 12px 12px 38px;
      font-size: 15px;
      border: 1px solid var(--celsa-border);
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: var(--celsa-red);
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .pesaje-frame {
      border: 1px solid var(--celsa-border);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #FAFAFC;
      position: relative;
    }

    .pesaje-frame-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .pesaje-frame-title {
      font-size: 13px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
    }

    .btn-remove-frame {
      background: none;
      border: none;
      color: var(--celsa-red);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .add-frame-container {
      display: flex;
      justify-content: center;
      margin: 5px 0;
    }

    .btn-add-frame {
      background-color: #FFFFFF;
      color: var(--celsa-red);
      border: 2px solid var(--celsa-red);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
    }

    .btn-add-frame:active {
      background-color: var(--celsa-red);
      color: #FFFFFF;
      transform: scale(0.95);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--celsa-red);
      color: #FFFFFF;
      border: none;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(227, 6, 19, 0.2);
    }

    .btn-submit:disabled {
      background-color: #999;
      box-shadow: none;
      cursor: not-allowed;
    }

    .loading-overlay {
      display: none;
      text-align: center;
      padding: 10px;
      color: var(--celsa-red);
      font-weight: bold;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="mobile-container">
    <header>
      <div>
        <div class="logo-box">CELSA</div>
        <div class="logo-sub">Conductores Eléctricos</div>
      </div>
      <div class="app-title">Traslado de Scrap Famia</div>
    </header>

    <main>
      <h2>Nuevo Registro</h2>

      <form id="pesajeForm">
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-calendar"></i>
            <input type="date" id="fecha" required>
          </div>
        </div>

        <div id="pesajeFramesContainer"></div>

        <div class="add-frame-container">
          <button type="button" class="btn-add-frame" onclick="agregarNuevoFrame()" title="Añadir pallet">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <div class="loading-overlay" id="loadingText">
            <i class="fa-solid fa-spinner fa-spin"></i> Registrando datos en Drive...
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <i class="fa-solid fa-cloud-arrow-up"></i> Registrar en Drive
        </button>
      </form>
    </main>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6yrpl68eblWBCvInDpPmt-NB0_NhjD6-KJDIiUZAqhEnM3vMKETbhiWpS6_qhVEgK/exec";
    document.getElementById('fecha').valueAsDate = new Date();
    let frameCounter = 0;

    window.addEventListener('DOMContentLoaded', () => {
      agregarNuevoFrame();
    });

    function agregarNuevoFrame() {
      frameCounter++;
      const container = document.getElementById('pesajeFramesContainer');
      const frame = document.createElement('div');
      frame.className = 'pesaje-frame';
      frame.id = `frame_${frameCounter}`;
      
      const deleteButton = frameCounter > 1 ?
        `<button type="button" class="btn-remove-frame" onclick="eliminarFrame(${frameCounter})"><i class="fa-solid fa-trash"></i></button>` :
        '';

      frame.innerHTML = `
            <div class="pesaje-frame-header">
                <span class="pesaje-frame-title">Pesaje #${frameCounter}</span>
                ${deleteButton}
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Origen de Scrap</label>
                    <div style="display: flex; gap: 20px; margin-top: 12px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="origen_scrap_${frameCounter}" value="Producción"> Producción
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="origen_scrap_${frameCounter}" value="Logistica"> Logística 
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Código SP</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" class="cod_sp" placeholder="Ej. SP-0001">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Tipo de Scrap</label>
                <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Primera"> Primera
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Segunda"> Segunda 
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Tercera"> Tercera 
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Buen estado"> Cobre bueno
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Quemado"> Cobre Quemado
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_scrap_${frameCounter}" value="Cinta Cu"> Cinta Cu
                    </label>
                </div>
            </div>
             
            <div class="form-group">
                <label>Siguiente Proceso</label>
                <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_proceso_${frameCounter}" value="Venta"> Venta
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_proceso_${frameCounter}" value="Segregación"> Segregación 
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_proceso_${frameCounter}" value="Compactado"> Compactado 
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="tipo_proceso_${frameCounter}" value="Moler"> Moler 
                    </label>
                </div>
            </div>
             
            <div class="form-row">
                <div class="form-group">
                    <label>P. Bruto (kg)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-weight-scale"></i>
                        <input type="number" step="0.1" class="p_bruto" placeholder="0.0" oninput="calcularNetoFrame(this)" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tara (kg)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-box"></i>
                        <input type="number" step="0.1" class="tara" placeholder="0.0" oninput="calcularNetoFrame(this)" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>P. Neto (kg)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-calculator"></i>
                    <input type="number" class="p_neto" placeholder="Cálculo automático" readonly style="background-color: #F2F2F7; font-weight: 600;">
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 0;">
                <label>Observación</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-comment-dots" style="position: absolute; left: 12px; color: #8E8E93;"></i>
                    <input type="text" class="observacion" placeholder="Añadir un comentario u observación..." style="padding-left: 38px;">
                </div>
            </div>
        `;
      container.appendChild(frame);
      renumerarFrames();
    }

    function eliminarFrame(id) {
      const frame = document.getElementById(`frame_${id}`);
      if (frame) {
        frame.remove();
        renumerarFrames();
      }
    }

    function renumerarFrames() {
      const frames = document.querySelectorAll('.pesaje-frame');
      frames.forEach((frame, index) => {
        const title = frame.querySelector('.pesaje-frame-title');
        if (title) title.textContent = `Caja #${index + 1}`;
      });
    }

    function calcularNetoFrame(inputEl) {
      const frame = inputEl.closest('.pesaje-frame');
      const bruto = parseFloat(frame.querySelector('.p_bruto').value) || 0;
      const tara = parseFloat(frame.querySelector('.tara').value) || 0;
      const neto = bruto - tara;
      frame.querySelector('.p_neto').value = neto > 0 ? neto.toFixed(1) : 0;
    }
    
    document.getElementById('pesajeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const loadingText = document.getElementById('loadingText');
      
      submitBtn.disabled = true;
      if (loadingText) loadingText.style.display = "block";

      const listaPesajes = [];
      const frames = document.querySelectorAll('.pesaje-frame');
      
      frames.forEach(frame => {
        // Obtenemos el ID numérico del frame actual desde su ID string original (ej. frame_2 -> 2)
        const currentId = frame.id.split('_')[1];

        const origenScrap = frame.querySelector(`input[name="origen_scrap_${currentId}"]:checked`).value;
        const tipoScrap = frame.querySelector(`input[name="tipo_scrap_${currentId}"]:checked`).value;
        const tipoProceso = frame.querySelector(`input[name="tipo_proceso_${currentId}"]:checked`).value;
        const codSp = frame.querySelector('.cod_sp').value;
        const pBruto = frame.querySelector('.p_bruto').value;
        const tara = frame.querySelector('.tara').value;
        const pNeto = frame.querySelector('.p_neto').value;
        const observacion = frame.querySelector('.observacion').value;

        // Estructuramos un solo array consolidado con todas las propiedades juntas por fila
        listaPesajes.push({
          origen_scrap: origenScrap,
          codigo_sp: codSp,
          tipo_scrap: tipoScrap,
          tipo_proceso: tipoProceso,
          p_bruto: pBruto,
          tara: tara,
          p_neto: pNeto,
          observacion: observacion
        });
      });

      const payload = {
        fecha: document.getElementById('fecha').value,
        pesajes: listaPesajes
      };

      fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then((resultado) => {
          // Ahora puedes validar la respuesta real del servidor
          if(resultado.status === "success") {
            alert("¡Registro exitoso! Todos los pesos se guardaron correctamente.");
            document.getElementById('pesajeForm').reset();
            document.getElementById('fecha').valueAsDate = new Date();
            document.getElementById('pesajeFramesContainer').innerHTML = "";
            frameCounter = 0;
            agregarNuevoFrame();
          } else {
            alert("Error en el script: " + resultado.message);
          }
        })
        .catch(error => {
          console.error('Error:', error);
          alert("Hubo un problema al procesar el envío.");
        })
        .finally(() => {
          submitBtn.disabled = false;
          if (loadingText) loadingText.style.display = "none";
        });
    });
  </script>
</body>

</html>
